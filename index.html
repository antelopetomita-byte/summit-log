<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SUMMIT LOG — 中村紳一郎 遠征記録帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0C1220;        /* 夜の山肌 */
  --surface:#121C30;
  --surface2:#182642;
  --line:#243350;
  --text:#E8EEF5;
  --muted:#8493A8;
  --glacier:#7FD8E8;    /* 氷河 */
  --lamp:#E8A852;       /* ヘッドランプ */
  --danger:#E87070;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--ink)}
body{
  font-family:'Zen Kaku Gothic New',-apple-system,sans-serif;
  background:var(--ink);color:var(--text);
  min-height:100vh;
  padding-bottom:calc(90px + env(safe-area-inset-bottom));
}
/* ---- header ---- */
header{
  padding:calc(20px + env(safe-area-inset-top)) 20px 0;
  background:
    linear-gradient(180deg, rgba(12,18,32,0) 60%, var(--ink) 100%),
    repeating-linear-gradient(105deg, transparent 0 26px, rgba(127,216,232,.06) 26px 27px);
}
.brand{font-family:'Shippori Mincho',serif;font-weight:800;font-size:22px;letter-spacing:.14em}
.brand small{display:block;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:500;font-size:11px;color:var(--muted);letter-spacing:.3em;margin-top:4px}
/* ---- stats ---- */
.stats{display:flex;gap:10px;margin:18px 0 6px}
.stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px 10px;text-align:center}
.stat b{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:800;color:var(--glacier);display:block}
.stat span{font-size:10px;color:var(--muted);letter-spacing:.1em}
/* ---- tabs ---- */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  display:flex;background:rgba(12,18,32,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
}
nav button{
  flex:1;background:none;border:none;color:var(--muted);
  font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.08em;
  padding:10px 4px;border-radius:10px;cursor:pointer;
}
nav button.on{color:var(--ink);background:var(--glacier)}
main{padding:8px 20px 20px}
.page{display:none}
.page.on{display:block}
h2{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:700;letter-spacing:.12em;margin:16px 0 12px;color:var(--glacier)}
/* ---- form ---- */
label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.12em;margin:14px 0 6px}
input,textarea,select{
  width:100%;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;color:var(--text);font-family:inherit;font-size:16px;
  padding:12px 14px;outline:none;
}
input:focus,textarea:focus{border-color:var(--glacier)}
textarea{min-height:170px;line-height:1.9;resize:vertical}
.row{display:flex;gap:10px}
.row>div{flex:1}
.btn{
  display:block;width:100%;margin-top:20px;padding:15px;
  background:var(--glacier);color:var(--ink);border:none;border-radius:12px;
  font-family:inherit;font-size:15px;font-weight:700;letter-spacing:.15em;cursor:pointer;
}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--text);margin-top:10px}
.btn.warn{background:none;border:1px solid var(--danger);color:var(--danger)}
/* ---- timeline ---- */
.search{margin-bottom:14px}
.tl{position:relative;padding-left:26px}
.tl::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;
  background:repeating-linear-gradient(180deg,var(--line) 0 6px,transparent 6px 11px)}
.card{
  position:relative;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;cursor:pointer;
}
.card::before{content:"";position:absolute;left:-23px;top:22px;width:9px;height:9px;
  border-radius:50%;background:var(--lamp);box-shadow:0 0 8px var(--lamp)}
.card .d{font-size:11px;color:var(--muted);letter-spacing:.08em}
.card .m{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:700;margin:3px 0 2px}
.card .meta{font-size:12px;color:var(--glacier)}
.card .ex{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.7;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:13px;line-height:2}
.empty b{font-family:'Shippori Mincho',serif;font-size:16px;color:var(--text);display:block;margin-bottom:8px}
/* ---- export ---- */
.exp-desc{font-size:12px;color:var(--muted);line-height:1.9;margin-bottom:6px}
.toast{
  position:fixed;left:50%;bottom:calc(100px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
  background:var(--glacier);color:var(--ink);font-size:13px;font-weight:700;
  padding:10px 22px;border-radius:99px;opacity:0;transition:.25s;z-index:99;pointer-events:none;white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* ---- detail modal ---- */
.modal{position:fixed;inset:0;background:rgba(6,10,18,.75);backdrop-filter:blur(6px);z-index:80;display:none;overflow-y:auto}
.modal.on{display:block}
.sheet{background:var(--surface);border:1px solid var(--line);border-radius:20px;
  margin:calc(40px + env(safe-area-inset-top)) 16px 40px;padding:22px}
.sheet .d{font-size:11px;color:var(--muted);letter-spacing:.1em}
.sheet .m{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:800;margin:4px 0 2px}
.sheet .meta{font-size:13px;color:var(--glacier);margin-bottom:4px}
.sheet .sub{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.8}
.sheet .body{font-size:14px;line-height:2.1;white-space:pre-wrap;border-top:1px solid var(--line);padding-top:14px}
.hidden-file{display:none}
</style>
</head>
<body>

<header>
  <div class="brand">SUMMIT LOG<small>中村紳一郎 遠征記録 — EXPEDITION JOURNAL</small></div>
  <div class="stats">
    <div class="stat"><b id="stCount">0</b><span>登頂記録</span></div>
    <div class="stat"><b id="stElev">0</b><span>累計標高 m</span></div>
    <div class="stat"><b id="stCountry">0</b><span>国・地域</span></div>
  </div>
</header>

<main>
  <!-- 記録一覧 -->
  <section class="page on" id="pageList">
    <input class="search" id="q" placeholder="山名・国・本文を検索" oninput="renderList()">
    <div class="tl" id="list"></div>
  </section>

  <!-- 新規記録 -->
  <section class="page" id="pageNew">
    <h2 id="formTitle">新しい記録</h2>
    <input type="hidden" id="fId">
    <label>日付</label><input type="date" id="fDate">
    <label>山名</label><input id="fMt" placeholder="例：モンブラン">
    <div class="row">
      <div><label>国・地域</label><input id="fCountry" placeholder="フランス"></div>
      <div><label>標高 (m)</label><input id="fElev" type="number" inputmode="numeric" placeholder="4808"></div>
    </div>
    <div class="row">
      <div><label>天候</label><input id="fWx" placeholder="快晴 / 吹雪 など"></div>
      <div><label>同行者</label><input id="fParty" placeholder="単独 / 〇〇と"></div>
    </div>
    <label>ルート・行程</label><input id="fRoute" placeholder="グーテルート、往復14時間 など">
    <label>記録・感想（そのまま本の原稿になります）</label>
    <textarea id="fBody" placeholder="今日感じたこと、見た景色、苦しかったこと、出会った人。&#10;短くても毎日書くことが、いちばんの財産になります。"></textarea>
    <button class="btn" onclick="saveEntry()">記録を保存する</button>
    <button class="btn warn" id="btnDel" style="display:none" onclick="delEntry()">この記録を削除</button>
  </section>

  <!-- 書き出し -->
  <section class="page" id="pageExport">
    <h2>本にする・書き出す</h2>
    <p class="exp-desc">記録を日付順にまとめて、山ごとの章立てが付いた原稿ファイルを作ります。出版社への持ち込みやKDP（Kindle出版）の下書きにそのまま使えます。</p>
    <button class="btn" onclick="exportMd()">書籍原稿（Markdown）を書き出す</button>
    <button class="btn ghost" onclick="exportTxt()">プレーンテキストを書き出す</button>
    <button class="btn ghost" onclick="copyMd()">原稿をクリップボードにコピー</button>
    <h2 style="margin-top:34px">バックアップ</h2>
    <p class="exp-desc">機種変更や万一に備えて、データ一式を保存・復元できます。長い遠征の前には必ずバックアップを。</p>
    <button class="btn ghost" onclick="exportJson()">バックアップを保存（JSON）</button>
    <button class="btn ghost" onclick="document.getElementById('fileIn').click()">バックアップから復元</button>
    <input type="file" id="fileIn" class="hidden-file" accept=".json" onchange="importJson(event)">
  </section>
</main>

<nav>
  <button class="on" id="tabList" onclick="go('List')">記録一覧</button>
  <button id="tabNew" onclick="go('New')">＋ 記録する</button>
  <button id="tabExport" onclick="go('Export')">本にする</button>
</nav>

<div class="toast" id="toast"></div>

<div class="modal" id="modal" onclick="if(event.target===this)this.classList.remove('on')">
  <div class="sheet" id="sheet"></div>
</div>

<script>
const KEY='summitlog.v1';
let entries = JSON.parse(localStorage.getItem(KEY)||'[]');

function save(){ localStorage.setItem(KEY, JSON.stringify(entries)); renderStats(); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtDate(d){ if(!d) return ''; const [y,m,dd]=d.split('-'); return `${y}年${+m}月${+dd}日`; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200); }

/* ---- navigation ---- */
function go(p){
  ['List','New','Export'].forEach(n=>{
    document.getElementById('page'+n).classList.toggle('on', n===p);
    document.getElementById('tab'+n).classList.toggle('on', n===p);
  });
  if(p==='New' && !document.getElementById('fId').value){
    clearForm();
  }
  if(p==='List') renderList();
}

/* ---- form ---- */
function clearForm(){
  ['fId','fMt','fCountry','fElev','fWx','fParty','fRoute','fBody'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('formTitle').textContent='新しい記録';
  document.getElementById('btnDel').style.display='none';
}
function saveEntry(){
  const e = {
    id: document.getElementById('fId').value || uid(),
    date: document.getElementById('fDate').value,
    mt: document.getElementById('fMt').value.trim(),
    country: document.getElementById('fCountry').value.trim(),
    elev: parseInt(document.getElementById('fElev').value)||0,
    wx: document.getElementById('fWx').value.trim(),
    party: document.getElementById('fParty').value.trim(),
    route: document.getElementById('fRoute').value.trim(),
    body: document.getElementById('fBody').value.trim(),
  };
  if(!e.date || !e.mt){ toast('日付と山名は必須です'); return; }
  const i = entries.findIndex(x=>x.id===e.id);
  if(i>=0) entries[i]=e; else entries.push(e);
  save(); clearForm(); go('List'); toast('保存しました');
}
function editEntry(id){
  const e = entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('modal').classList.remove('on');
  document.getElementById('fId').value=e.id;
  document.getElementById('fDate').value=e.date;
  document.getElementById('fMt').value=e.mt;
  document.getElementById('fCountry').value=e.country;
  document.getElementById('fElev').value=e.elev||'';
  document.getElementById('fWx').value=e.wx;
  document.getElementById('fParty').value=e.party;
  document.getElementById('fRoute').value=e.route;
  document.getElementById('fBody').value=e.body;
  document.getElementById('formTitle').textContent='記録を編集';
  document.getElementById('btnDel').style.display='block';
  go('New');
}
function delEntry(){
  const id = document.getElementById('fId').value;
  if(!confirm('この記録を削除しますか？元に戻せません。')) return;
  entries = entries.filter(x=>x.id!==id);
  save(); clearForm(); go('List'); toast('削除しました');
}

/* ---- list / detail ---- */
function renderStats(){
  document.getElementById('stCount').textContent = entries.length;
  document.getElementById('stElev').textContent = entries.reduce((s,e)=>s+(e.elev||0),0).toLocaleString();
  document.getElementById('stCountry').textContent = new Set(entries.map(e=>e.country).filter(Boolean)).size;
}
function renderList(){
  const q = (document.getElementById('q').value||'').toLowerCase();
  const list = document.getElementById('list');
  const items = entries
    .filter(e=>!q || (e.mt+e.country+e.body+e.route).toLowerCase().includes(q))
    .sort((a,b)=>b.date.localeCompare(a.date));
  if(!items.length){
    list.innerHTML = `<div class="empty"><b>まだ記録がありません</b>「＋ 記録する」から最初の一座を書き残しましょう。<br>短い一行でも、未来の本の一頁になります。</div>`;
    return;
  }
  list.innerHTML = items.map(e=>`
    <div class="card" onclick="showDetail('${e.id}')">
      <div class="d">${fmtDate(e.date)}${e.wx?` ・ ${esc(e.wx)}`:''}</div>
      <div class="m">${esc(e.mt)}</div>
      <div class="meta">${esc(e.country)}${e.elev?` — ${e.elev.toLocaleString()} m`:''}</div>
      ${e.body?`<div class="ex">${esc(e.body)}</div>`:''}
    </div>`).join('');
}
function showDetail(id){
  const e = entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('sheet').innerHTML = `
    <div class="d">${fmtDate(e.date)}</div>
    <div class="m">${esc(e.mt)}</div>
    <div class="meta">${esc(e.country)}${e.elev?` — ${e.elev.toLocaleString()} m`:''}</div>
    <div class="sub">${e.wx?`天候：${esc(e.wx)}<br>`:''}${e.party?`同行：${esc(e.party)}<br>`:''}${e.route?`行程：${esc(e.route)}`:''}</div>
    <div class="body">${esc(e.body)||'（本文なし）'}</div>
    <button class="btn ghost" onclick="editEntry('${e.id}')">編集する</button>`;
  document.getElementById('modal').classList.add('on');
}

/* ---- export ---- */
function sorted(){ return [...entries].sort((a,b)=>a.date.localeCompare(b.date)); }
function buildMd(){
  const items = sorted();
  let md = `# 世界の山を歩く\n\n中村紳一郎 遠征記録 — 全${items.length}篇\n\n---\n\n`;
  let currentMt = null;
  for(const e of items){
    if(e.mt !== currentMt){
      currentMt = e.mt;
      md += `\n## ${e.mt}${e.country?`（${e.country}${e.elev?` / ${e.elev.toLocaleString()}m`:''}）`:''}\n\n`;
    }
    md += `### ${fmtDate(e.date)}\n\n`;
    const meta = [e.wx&&`天候：${e.wx}`, e.party&&`同行：${e.party}`, e.route&&`行程：${e.route}`].filter(Boolean).join(' ／ ');
    if(meta) md += `> ${meta}\n\n`;
    md += `${e.body||''}\n\n`;
  }
  return md;
}
function buildTxt(){
  return sorted().map(e=>{
    const meta=[e.country, e.elev?`${e.elev}m`:'', e.wx, e.party, e.route].filter(Boolean).join(' / ');
    return `■ ${fmtDate(e.date)} ${e.mt}\n${meta}\n\n${e.body||''}\n`;
  }).join('\n----------------------------------------\n\n');
}
function download(name, text, type){
  const blob = new Blob([text],{type});
  const file = new File([blob], name, {type});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(()=>fallbackDl(blob,name));
  } else fallbackDl(blob,name);
}
function fallbackDl(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
function stamp(){ return new Date().toISOString().slice(0,10); }
function exportMd(){ if(!entries.length)return toast('記録がありません'); download(`summit-log_${stamp()}.md`, buildMd(), 'text/markdown'); toast('原稿を書き出しました'); }
function exportTxt(){ if(!entries.length)return toast('記録がありません'); download(`summit-log_${stamp()}.txt`, buildTxt(), 'text/plain'); toast('書き出しました'); }
function copyMd(){
  if(!entries.length)return toast('記録がありません');
  navigator.clipboard.writeText(buildMd()).then(()=>toast('コピーしました')).catch(()=>toast('コピーできませんでした'));
}
function exportJson(){ download(`summit-log_backup_${stamp()}.json`, JSON.stringify(entries,null,2), 'application/json'); toast('バックアップを保存しました'); }
function importJson(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const data = JSON.parse(r.result);
      if(!Array.isArray(data)) throw 0;
      if(!confirm(`${data.length}件の記録を読み込みます。現在のデータと統合しますか？`)) return;
      const ids = new Set(entries.map(e=>e.id));
      for(const e of data) if(e.id && !ids.has(e.id)) entries.push(e);
      save(); renderList(); toast('復元しました');
    }catch{ toast('ファイルを読み込めませんでした'); }
  };
  r.readAsText(f);
  ev.target.value='';
}

/* ---- init ---- */
clearForm(); renderStats(); renderList();
</script>
</body>
</html>
